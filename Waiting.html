<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chờ đợi điều bất ngờ...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fceaf1 0%, #e8ddfc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #d63384;
            text-align: center;
        }

        h1 { font-size: 2rem; margin-bottom: 20px; }

        #countdown {
            display: flex;
            gap: 20px;
            font-weight: bold;
        }

        .time-box {
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            min-width: 80px;
        }

        .number { font-size: 2.5rem; display: block; color: #8a2be2; }
        .label { font-size: 0.8rem; text-transform: uppercase; color: #999; }

        .message { margin-top: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <h1>Món quà bí mật sẽ xuất hiện sau...</h1>

    <div id="countdown">
        <div class="time-box">
            <span class="number" id="days">00</span>
            <span class="label">Ngày</span>
        </div>
        <div class="time-box">
            <span class="number" id="hours">00</span>
            <span class="label">Giờ</span>
        </div>
        <div class="time-box">
            <span class="number" id="minutes">00</span>
            <span class="label">Phút</span>
        </div>
        <div class="time-box">
            <span class="number" id="seconds">00</span>
            <span class="label">Giây</span>
        </div>
    </div>

    <p class="message">Hãy kiên nhẫn một chút nhé! ❤️</p>

    <script>
        // --- CẤU HÌNH Ở ĐÂY ---
        const targetDate = new Date("May 16, 2026 00:00:00").getTime(); // Ngày sinh nhật
        const redirectUrl = "https://your-invitation-link.com"; // Link invitation của bạn
        // ----------------------

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Tính toán thời gian
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Hiển thị kết quả
            document.getElementById("days").innerText = days < 10 ? "0"+days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0"+hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0"+minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0"+seconds : seconds;

            // Nếu đếm ngược kết thúc
            if (distance < 0) {
                clearInterval(timer);
                window.location.href = redirectUrl; // Nhảy sang link invitation
            }
        }, 1000);
    </script>
</body>
</html>
